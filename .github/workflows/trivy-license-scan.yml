name: Trivy License Scan

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: trivy-license-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-license:
    name: Trivy License Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Run Trivy license scan
        run: |
          trivy fs \
            --scanners license \
            --format json \
            --severity UNKNOWN,HIGH,CRITICAL \
            --exit-code 1 \
            --output trivy-license-report.json \
            .

      - name: Upload license scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-license-report-${{ github.run_id }}
          path: trivy-license-report.json
          if-no-files-found: ignore
