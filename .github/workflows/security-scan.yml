name: Security Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_scans:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GO111MODULE: on
      GOFLAGS: "-buildvcs=false"
      GOPRIVATE: "github.com/root-sector-ltd-and-co-kg/*"
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Configure private module auth
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$GH_PAT" ]; then
            echo "machine github.com login x-access-token password ${GH_PAT}" >> ~/.netrc
            chmod 600 ~/.netrc
            git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run Go tests
        run: go test ./...

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec
        run: gosec ./...

      - name: Install Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run Govulncheck
        run: govulncheck ./...

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Trivy vulnerability, secret, and misconfiguration scan
        run: |
          trivy fs \
            --scanners vuln,secret,misconfig \
            --format json \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --output trivy-security-report.json \
            .

      - name: Upload security scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lib-crypto-security-report-${{ github.run_id }}
          path: trivy-security-report.json
          if-no-files-found: ignore
          retention-days: 3
